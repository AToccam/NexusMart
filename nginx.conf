worker_processes auto;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # 开启 gzip 压缩
    gzip  on;
    gzip_min_length 1k;
    gzip_types text/plain application/json application/javascript text/css text/xml;
    gzip_vary on;

    # 请求体大小限制
    client_max_body_size 10m;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 后端 Spring Boot 服务（Docker 环境使用服务名，本地可改为 127.0.0.1）
    upstream backend {
        server app:8081;
        keepalive 64;
    }

    # 限流配置：防止秒杀接口被刷
    limit_req_zone $binary_remote_addr zone=seckill_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    server {
        listen 80;
        server_name localhost;

        # ---------- 静态资源 ----------
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ---------- 秒杀接口（严格限流） ----------
        location /api/seckill/ {
            limit_req zone=seckill_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    10s;
        }

        # ---------- 通用 API 代理 ----------
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    10s;
        }

        # 自定义 429 错误页
        error_page 429 /429.html;
        location = /429.html {
            default_type application/json;
            return 429 '{"code": 429, "message": "请求过于频繁，请稍后再试"}';
        }

        # 屏蔽隐藏文件访问
        location ~ /\. {
            deny all;
        }
    }
}
