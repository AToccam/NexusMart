<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusMart 秒杀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #333; }
        .user-bar { text-align: center; margin-bottom: 24px; }
        .user-bar label { font-size: 15px; margin-right: 8px; }
        .user-bar input { width: 120px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
        .goods-list { max-width: 800px; margin: 0 auto; }
        .goods-card {
            background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .goods-info h3 { margin-bottom: 6px; color: #222; }
        .goods-info p { color: #888; font-size: 14px; }
        .price-original { text-decoration: line-through; color: #999; margin-right: 10px; }
        .price-seckill { color: #e4393c; font-size: 20px; font-weight: bold; }
        .stock { color: #52c41a; font-size: 13px; margin-top: 4px; }
        .stock.empty { color: #999; }
        .btn-seckill {
            padding: 10px 28px; background: #e4393c; color: #fff; border: none;
            border-radius: 4px; font-size: 15px; cursor: pointer; white-space: nowrap;
        }
        .btn-seckill:hover { background: #c1272d; }
        .btn-seckill:disabled { background: #ccc; cursor: not-allowed; }
        .result-box {
            max-width: 800px; margin: 20px auto; padding: 16px; border-radius: 8px;
            display: none; font-size: 14px;
        }
        .result-box.success { display: block; background: #f6ffed; border: 1px solid #b7eb8f; color: #135200; }
        .result-box.error { display: block; background: #fff2f0; border: 1px solid #ffccc7; color: #a8071a; }
        .empty-tip { text-align: center; color: #999; padding: 40px 0; }

        /* 通知弹窗 */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 14px 32px; border-radius: 8px; font-size: 15px; z-index: 999;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15); transition: opacity 0.4s;
        }
        .toast.success { background: #52c41a; color: #fff; }
        .toast.error   { background: #e4393c; color: #fff; }
        .toast.hide { opacity: 0; }

        /* Tab 栏 */
        .tab-bar { max-width: 800px; margin: 0 auto 16px; display: flex; gap: 12px; }
        .tab-bar button {
            padding: 8px 24px; border: 2px solid #e4393c; border-radius: 4px;
            background: #fff; color: #e4393c; font-size: 14px; cursor: pointer;
        }
        .tab-bar button.active { background: #e4393c; color: #fff; }

        /* 订单列表 */
        .order-card {
            background: #fff; border-radius: 8px; padding: 16px 20px; margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex;
            justify-content: space-between; align-items: center;
        }
        .order-card .order-info span { margin-right: 18px; font-size: 14px; color: #555; }
        .order-card .order-id { font-weight: bold; color: #222; }
        .status-tag {
            display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px;
        }
        .status-0 { background: #fff7e6; color: #d48806; }
        .status-1 { background: #f6ffed; color: #389e0d; }
        .status-2 { background: #e6f7ff; color: #096dd9; }
        .status-3 { background: #fff1f0; color: #cf1322; }
    </style>
</head>
<body>

<h1>🛒 NexusMart 秒杀商城</h1>

<div class="user-bar">
    <span id="userGreeting"></span>
    <button id="logoutBtn" onclick="doLogout()" style="margin-left:12px;padding:4px 14px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;font-size:13px;">退出登录</button>
</div>

<div class="tab-bar">
    <button id="tabGoods" class="active" onclick="switchTab('goods')">秒杀商品</button>
    <button id="tabOrders" onclick="switchTab('orders')">我的订单</button>
</div>

<div id="goodsPanel">
    <div id="resultBox" class="result-box"></div>
    <div id="goodsList" class="goods-list">
        <p class="empty-tip">加载中…</p>
    </div>
</div>

<div id="ordersPanel" style="display:none;">
    <div id="ordersList" class="goods-list">
        <p class="empty-tip">点击上方「我的订单」查看</p>
    </div>
</div>

<script>
    const API_BASE = '';

    // 登录状态检查
    const currentUserId = sessionStorage.getItem('userId');
    const currentNickname = sessionStorage.getItem('nickname');
    if (!currentUserId) {
        window.location.href = 'login.html';
    }
    document.getElementById('userGreeting').textContent = '👤 ' + (currentNickname || '') + '（ID: ' + currentUserId + '）';

    function doLogout() {
        sessionStorage.clear();
        window.location.href = 'login.html';
    }

    function getUserId() {
        return currentUserId;
    }

    // 加载商品列表
    async function loadGoods() {
        const container = document.getElementById('goodsList');
        try {
            const resp = await fetch(API_BASE + '/api/goods/seckill/list');
            const result = await resp.json();
            if (result.code !== 200 || !result.data || result.data.length === 0) {
                container.innerHTML = '<p class="empty-tip">暂无正在进行的秒杀商品</p>';
                return;
            }
            container.innerHTML = result.data.map(g => `
                <div class="goods-card">
                    <div class="goods-info">
                        <h3>${escapeHtml(g.goodsName)}</h3>
                        <p>
                            <span class="price-original">¥${g.goodsPrice}</span>
                            <span class="price-seckill">¥${g.seckillPrice}</span>
                        </p>
                        <p class="stock ${g.stockCount <= 0 ? 'empty' : ''}">
                            剩余库存：${g.stockCount}
                        </p>
                    </div>
                    <button class="btn-seckill" onclick="doSeckill(${g.seckillId})"
                            ${g.stockCount <= 0 ? 'disabled' : ''}>
                        ${g.stockCount <= 0 ? '已售罄' : '立即抢购'}
                    </button>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = '<p class="empty-tip">加载失败，请检查后端服务是否启动</p>';
        }
    }

    // 执行秒杀
    async function doSeckill(seckillId) {
        const userId = getUserId();

        const box = document.getElementById('resultBox');
        box.className = 'result-box';
        box.style.display = 'none';

        try {
            const resp = await fetch(API_BASE + '/api/seckill/do', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `userId=${encodeURIComponent(userId)}&seckillId=${encodeURIComponent(seckillId)}`
            });
            const result = await resp.json();
            if (result.code === 200) {
                box.className = 'result-box success';
                box.innerHTML = `⏳ 已进入排队，业务订单号：${result.data.orderNo}，请求ID：${escapeHtml(result.data.requestId)}，请稍后在订单列表查看结果`;
                showToast('请求已入队，订单号 #' + result.data.orderNo, 'success');
                loadGoods(); // 刷新库存
            } else {
                box.className = 'result-box error';
                box.textContent = '❌ ' + result.msg;
                showToast(result.msg, 'error');
            }
        } catch (e) {
            box.className = 'result-box error';
            box.textContent = '❌ 请求失败：' + e.message;
        }
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str || ''));
        return div.innerHTML;
    }

    // Tab 切换
    function switchTab(tab) {
        document.getElementById('tabGoods').className = tab === 'goods' ? 'active' : '';
        document.getElementById('tabOrders').className = tab === 'orders' ? 'active' : '';
        document.getElementById('goodsPanel').style.display = tab === 'goods' ? '' : 'none';
        document.getElementById('ordersPanel').style.display = tab === 'orders' ? '' : 'none';
        if (tab === 'orders') loadOrders();
    }

    // 加载订单列表
    async function loadOrders() {
        const userId = getUserId();
        const container = document.getElementById('ordersList');
        container.innerHTML = '<p class="empty-tip">加载中…</p>';
        try {
            const resp = await fetch(API_BASE + '/api/seckill/orders?userId=' + encodeURIComponent(userId));
            const result = await resp.json();
            if (result.code !== 200 || !result.data || result.data.length === 0) {
                container.innerHTML = '<p class="empty-tip">暂无订单</p>'; return;
            }
            const statusMap = { 0: '排队中', 1: '成功', 2: '失败' };
            container.innerHTML = result.data.map(o => `
                <div class="order-card">
                    <div class="order-info">
                        <span class="order-id">订单 #${o.id}</span>
                        <span>商品：${escapeHtml(o.goodsName)}</span>
                        <span>金额：¥${o.orderPrice}</span>
                        <span>时间：${o.createTime ? o.createTime.replace('T', ' ') : '-'}</span>
                    </div>
                    <span class="status-tag status-${o.status}">${statusMap[o.status] || '未知'}</span>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = '<p class="empty-tip">加载失败</p>';
        }
    }

    // Toast 通知
    function showToast(msg, type) {
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => { el.classList.add('hide'); }, 2500);
        setTimeout(() => { el.remove(); }, 3000);
    }

    loadGoods();
</script>
</body>
</html>
