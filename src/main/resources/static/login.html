<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusMart - 登录 / 注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 400px; padding: 40px 36px; }
        .card h2 { text-align: center; margin-bottom: 28px; color: #333; }
        .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eee; }
        .tabs button { flex: 1; padding: 10px 0; border: none; background: none; font-size: 15px; cursor: pointer; color: #999; position: relative; }
        .tabs button.active { color: #e4393c; font-weight: bold; }
        .tabs button.active::after { content: ''; position: absolute; bottom: -2px; left: 20%; width: 60%; height: 2px; background: #e4393c; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #e4393c; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; color: #fff; background: #e4393c; margin-top: 8px; }
        .btn:hover { background: #c1272d; }
        .msg { margin-top: 14px; padding: 10px; border-radius: 6px; font-size: 13px; display: none; }
        .msg.success { display: block; background: #f6ffed; border: 1px solid #b7eb8f; color: #135200; }
        .msg.error { display: block; background: #fff2f0; border: 1px solid #ffccc7; color: #a8071a; }
        .success-id { font-size: 22px; font-weight: bold; color: #e4393c; }
        .tip { font-size: 12px; color: #999; margin-top: 16px; text-align: center; }
        .tip a { color: #e4393c; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛒 NexusMart</h2>

    <div class="tabs">
        <button id="tabLogin" class="active" onclick="switchAuth('login')">登录</button>
        <button id="tabRegister" onclick="switchAuth('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <div id="loginForm">
        <div class="form-group">
            <label>用户 ID 或用户名</label>
            <input id="loginAccount" type="text" placeholder="请输入用户 ID 或用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input id="loginPwd" type="password" placeholder="请输入密码">
        </div>
        <button class="btn" onclick="doLogin()">登 录</button>
        <div id="loginMsg" class="msg"></div>
        <p class="tip">没有账号？<a href="#" onclick="switchAuth('register');return false;">立即注册</a></p>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" style="display:none;">
        <div class="form-group">
            <label>用户名（不能为纯数字）</label>
            <input id="regNick" type="text" placeholder="给自己取个名字" maxlength="50">
        </div>
        <div class="form-group">
            <label>密码（至少6位）</label>
            <input id="regPwd" type="password" placeholder="请输入密码" minlength="6">
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input id="regPwd2" type="password" placeholder="请再次输入密码">
        </div>
        <button class="btn" onclick="doRegister()">注 册</button>
        <div id="regMsg" class="msg"></div>
        <p class="tip">已有账号？<a href="#" onclick="switchAuth('login');return false;">去登录</a></p>
    </div>
</div>

<script>
    const API_BASE = '';

    function switchAuth(tab) {
        document.getElementById('tabLogin').className = tab === 'login' ? 'active' : '';
        document.getElementById('tabRegister').className = tab === 'register' ? 'active' : '';
        document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
        document.getElementById('loginMsg').className = 'msg';
        document.getElementById('regMsg').className = 'msg';
    }

    async function doLogin() {
        const account = document.getElementById('loginAccount').value.trim();
        const pwd = document.getElementById('loginPwd').value;
        const msg = document.getElementById('loginMsg');

        if (!account) { showMsg(msg, '请输入用户 ID 或用户名', 'error'); return; }
        if (!pwd) { showMsg(msg, '请输入密码', 'error'); return; }

        try {
            const resp = await fetch(API_BASE + '/api/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `account=${encodeURIComponent(account)}&password=${encodeURIComponent(pwd)}`
            });
            const result = await resp.json();
            if (result.code === 200) {
                // 存储登录信息到 sessionStorage
                sessionStorage.setItem('userId', result.data.id);
                sessionStorage.setItem('nickname', result.data.nickname);
                showMsg(msg, '登录成功，正在跳转…', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } else {
                showMsg(msg, result.msg, 'error');
            }
        } catch (e) {
            showMsg(msg, '请求失败：' + e.message, 'error');
        }
    }

    async function doRegister() {
        const nick = document.getElementById('regNick').value.trim();
        const pwd = document.getElementById('regPwd').value;
        const pwd2 = document.getElementById('regPwd2').value;
        const msg = document.getElementById('regMsg');

        if (!nick) { showMsg(msg, '请输入用户名', 'error'); return; }
        if (/^\d+$/.test(nick)) { showMsg(msg, '用户名不能为纯数字', 'error'); return; }
        if (!pwd || pwd.length < 6) { showMsg(msg, '密码长度不能少于6位', 'error'); return; }
        if (pwd !== pwd2) { showMsg(msg, '两次密码输入不一致', 'error'); return; }

        try {
            const resp = await fetch(API_BASE + '/api/user/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `nickname=${encodeURIComponent(nick)}&password=${encodeURIComponent(pwd)}&confirmPassword=${encodeURIComponent(pwd2)}`
            });
            const result = await resp.json();
            if (result.code === 200) {
                showMsg(msg,
                    `🎉 注册成功！您的用户 ID 是：<span class="success-id">${result.data.id}</span><br>可使用 ID 或用户名登录`,
                    'success');
            } else {
                showMsg(msg, result.msg, 'error');
            }
        } catch (e) {
            showMsg(msg, '请求失败：' + e.message, 'error');
        }
    }

    function showMsg(el, text, type) {
        el.className = 'msg ' + type;
        el.innerHTML = text;
    }

    // 回车触发
    document.getElementById('loginAccount').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPwd').focus(); });
    document.getElementById('loginPwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('regPwd2').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
