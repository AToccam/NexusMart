server:
  # 服务启动端口，默认是8080，为了避免冲突可以改一下
  port: 8081
  tomcat:
    threads:
      max: 800         # 最大工作线程数（默认200，高并发场景需加大）
      min-spare: 100   # 最小空闲线程数（默认10）
    max-connections: 10000  # 最大连接数（默认8192）
    accept-count: 1000      # 等待队列长度（默认100）

spring:
  application:
    name: NexusMart-Seckill
  datasource:
    # MySQL 8.0 及以上的标准驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 本地开发常用参数：关闭 SSL + 允许公钥检索，避免 MySQL8 默认认证导致连接失败
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/nexusmart?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 100     # 最大连接数（默认10，远不够高并发）
      minimum-idle: 20           # 最小空闲连接数
      connection-timeout: 10000  # 获取连接超时（毫秒），默认30000
      idle-timeout: 300000       # 空闲连接最大存活时间
      max-lifetime: 600000       # 连接最大生命周期

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}  # 无密码则留空
      database: 0
      lettuce:
        pool:
          max-active: 200   # 最大活跃连接数（默认8）
          max-idle: 50      # 最大空闲连接数
          min-idle: 10      # 最小空闲连接数
          max-wait: 5000ms  # 获取连接最大等待时间

# MyBatis 配置
mybatis:
  # 如果后续写 XML Mapper 文件，放在 resources/mapper/ 目录下即可自动扫描
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开启驼峰命名自动映射：数据库 goods_name -> Java goodsName
    map-underscore-to-camel-case: true
    # 打印 SQL 日志，方便开发调试（上线时改为 WARN 或去掉）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${DB_MASTER_HOST:127.0.0.1}:${DB_MASTER_PORT:3307}/nexusmart?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:123456}
      maximum-pool-size: 60
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://${DB_SLAVE_HOST:127.0.0.1}:${DB_SLAVE_PORT:3308}/nexusmart?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:123456}
      maximum-pool-size: 60
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000