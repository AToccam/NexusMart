version: "3.8"

services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: nexusmart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: nexusmart
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 如有初始化 SQL 脚本，放在 ./sql/ 目录下会自动执行
      # - ./sql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - nexusmart-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: nexusmart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - nexusmart-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Spring Boot App ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexusmart-app
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8081:8081"
    networks:
      - nexusmart-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==================== Nginx ====================
  nginx:
    image: nginx:alpine
    container_name: nexusmart-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/main/resources/static:/usr/share/nginx/html:ro
    networks:
      - nexusmart-net
    depends_on:
      - app

networks:
  nexusmart-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
